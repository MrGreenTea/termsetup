# ABOUTME: Jujutsu (jj) configuration file with settings ported from git config
# ABOUTME: Includes delta pager, nvim merge editor, GPG signing, and user settings
"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Jonas Bulik"
email = "jonas@bulik.dev"

[ui]
pager = "delta"
default-command = "status"
diff-formatter = ["difft", "--color=always", "$left", "$right"]

[merge-tools.nvim]
program = "nvim"
# Adapted from git mergetool "nvim" cmd configuration
merge-args = [
  "-d",
  "-c",
  "wincmd l",
  "-c",
  "norm ]c",
  "$left",
  "$output",
  "$right",
]

[merge-tools.diffconflicts]
program = "nvim"
merge-args = ["-c", "JJDiffConflicts", "$output"]
merge-tool-edits-conflict-markers = true

[signing]
behavior = "keep"  # Options: keep, sign, drop (keep existing signatures, don't auto-sign)
backend = "gpg"
key = "F19710F77B1A3CBC"

[template-aliases]
log_compact = """
          if(root,
              format_root_commit(self),
              label(if(current_working_copy, "working_copy"),
                concat(
                  separate(" ",
                    format_short_change_id_with_hidden_and_divergent_info(self),
                    if(empty, label("empty", "(empty)")),
                    if(description,
                      description.first_line(),
                      label(if(empty, "empty"), description_placeholder),
                    ),
                    bookmarks,
                    tags,
                    working_copies,
                    if(git_head, label("git_head", "HEAD")),
                    if(conflict, label("conflict", "conflict")),
                    if(config("ui.show-cryptographic-signatures").as_boolean(),
                      format_short_cryptographic_signature(signature)),
                    if(!description && !empty, "\n" ++ diff.summary()),
                  ) ++ "\n",
                ),
              )
            )
"""

[revset-aliases]
"trunk()" = "main@origin"

[revset]
log = "working_copies():: | ancestors(remote_bookmarks().., 2) | trunk() | fork_point(@ | trunk())::"

[[--scope]]
--when.repositories = ["~/Development/Elever/"]

[--scope.user]
email = "jb@altusforge.com"
