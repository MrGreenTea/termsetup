"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Jonas Bulik"
email = "jonas@bulik.dev"

[ui]
pager = "delta"
default-command = "status"
diff-formatter = ["difft", "--color=always", "$left", "$right"]

[merge-tools.nvim]
program = "nvim"
# Adapted from git mergetool "nvim" cmd configuration
merge-args = [
  "-d",
  "-c",
  "wincmd l",
  "-c",
  "norm ]c",
  "$left",
  "$output",
  "$right",
]

[merge-tools.diffconflicts]
program = "nvim"
merge-args = [
  "-c",
  "let g:jj_diffconflicts_marker_length=$marker_length",
  "-c",
  "JJDiffConflicts!",
  "$output",
  "$base",
  "$left",
  "$right",
]
merge-tool-edits-conflict-markers = true

[revset-aliases]
"trunk()" = "main@origin"
"closest_pushable(to)" = 'heads(::to & mutable() & ~description(exact:"") & (~empty() | merges()))'
"closest_bookmark(to)" = "heads(::to & bookmarks())"

[revset]
log = "working_copies():: | ancestors(remote_bookmarks().., 2) | trunk() | fork_point(@ | trunk())::"

[revsets]
bookmark-advance-to = "closest_pushable(@)"

[fix.tools.ruff]
enabled = false
command = ["uvx", "ruff", "format", "--stdin-filename", "$path"]
patterns = ["glob:'**/*.py'"]

[fix.tools.tombi]
enabled = false
command = ["tombi", "format", "--stdin-filename", "$path", "-"]
patterns = ["glob:'**/*.toml'"]

[fix.tools.prettier]
enabled = false
command = ["npx", "prettier", "--stdin-filepath", "$path"]
patterns = [
  "glob:'**/*.ts'",
  "glob:'**/*.js'",
  "glob:'**/*.cjs'",
  "glob:'**/*.json'",
  "glob:'**/*.svelte'",
  "glob:'**/*.astro'",
  "glob:'**/*.md'",
  "glob:'**/*.mdx'",
]

[[--scope]]
--when.repositories = ["~/Development/Elever/"]

[--scope.user]
email = "jb@altusforge.com"
